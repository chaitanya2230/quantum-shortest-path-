<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SOS Caller App</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #111; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { font-size: 18px; margin: 0; font-weight: 600; color: #fff; }
        .emergency-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .dial-label { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .dial-input { font-size: 64px; text-align: center; background: none; border: none; color: white; width: 100%; font-weight: 300; letter-spacing: 4px; outline: none; margin-bottom: 50px; }
        
        .call-btn {
            width: 140px; height: 140px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
            cursor: pointer; position: relative; outline: none; transition: transform 0.1s;
        }
        .call-btn:active { transform: scale(0.95); }
        .call-btn span { font-size: 48px; display: block; margin-top: -5px; } /* telephone emoji size */
        
        .status { margin-top: 40px; font-size: 15px; color: #aaa; text-align: center; line-height: 1.5; padding: 0 20px; }
        .live-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 60px rgba(34, 197, 94, 0.8), 0 0 0 20px rgba(34, 197, 94, 0.1); } 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mobile Phone Simulation</h1>
    </div>
    
    <div class="emergency-container">
        <!-- Number Dialer -->
        <div class="dial-label">Medical Emergency</div>
        <input type="tel" id="dialNumber" value="108" class="dial-input" />
        
        <button class="call-btn" id="sosBtn" onclick="triggerSOS()">
            <span>📞</span>
        </button>
        <div class="status" id="statusText">Tap to call. The call will automatically piggy-back your live GPS data to the dispatcher dashboard.</div>
    </div>

    <script>
        // Lock the simulated proxy coordinates once per session so the map doesn't bounce if tapped multiple times
        const lockedSimLat = 17.7104 + (Math.random() * 0.02 - 0.01);
        const lockedSimLng = 83.1657 + (Math.random() * 0.02 - 0.01);
        let isDispatching = false;

        async function triggerSOS() {
            if (isDispatching) return;
            isDispatching = true;
            
            const btn = document.getElementById('sosBtn');
            const statusBox = document.getElementById('statusText');
            const numDialed = document.getElementById('dialNumber').value;
            
            btn.classList.add('live-pulse');
            statusBox.innerHTML = '<span style="color:#38bdf8">Dialing ' + numDialed + ' & Locating GPS...</span>';
            
            // Pass the number back to the API safely
            const apiPayload = (lat, lng) => JSON.stringify({ 
                userLat: lat, userLng: lng, 
                hospitalLat: lat, hospitalLng: lng // Dummy data to fill expected API
            });
            
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    
                    statusBox.innerHTML = `<span style="color:#fbbf24">In Call with Dispatch... Transmitting Location (${lat.toFixed(4)}, ${lng.toFixed(4)})</span>`;
                    
                    try {
                        const currentIP = window.location.hostname;
                        const backendURL = 'http://' + currentIP + ':8001/api/sos_trigger';

                        const res = await fetch(backendURL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: apiPayload(lat, lng)
                        });
                        
                        if (res.ok) {
                            statusBox.innerHTML = '<strong style="color:#22c55e">✓ Call Connected.</strong><br/>Dispatch has your precise location. Ambulance deployed.';
                            btn.style.background = "#059669";
                            btn.style.boxShadow = "none";
                            btn.classList.remove('live-pulse');
                        } else { throw new Error('API Reject'); }
                    } catch (e) {
                        statusBox.innerHTML = '<span style="color:#ef4444">Call Failed. Ensure PC backend is running.</span>';
                        btn.classList.remove('live-pulse');
                        isDispatching = false;
                    }
                    
                }, async (error) => {
                    // Fallback simulation for HTTP networks
                    statusBox.innerHTML = '<span style="color:#fbbf24">HTTP Secured GPS Blocked. Tracking via Cellular Triangulation...</span>';
                    
                    setTimeout(async () => {
                        try {
                            const currentIP = window.location.hostname;
                            const backendURL = 'http://' + currentIP + ':8001/api/sos_trigger';
                            const res = await fetch(backendURL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: apiPayload(lockedSimLat, lockedSimLng)
                            });
                            
                            if (res.ok) {
                                statusBox.innerHTML = '<strong style="color:#22c55e">✓ Call Connected (Triangulated).</strong><br/>Dispatch intercepted your signal. Look at your PC screen!';
                                btn.style.background = "#059669";
                                btn.style.boxShadow = "none";
                                btn.classList.remove('live-pulse');
                            } else { throw new Error('API Reject'); }
                        } catch (e) {
                            statusBox.innerHTML = '<span style="color:#ef4444">Cellular Simulation Failed. Ensure `python api_server.py` is running on PC.</span>';
                            btn.classList.remove('live-pulse');
                            isDispatching = false;
                        }
                    }, 1500);
                });
            } else {
                statusBox.textContent = 'Geolocation not supported by this browser.';
                isDispatching = false;
            }
        }
    </script>
</body>
</html>
